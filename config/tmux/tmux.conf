# ~/.config/tmux/tmux.conf — auto-loaded by tmux 3.1+ from XDG_CONFIG_HOME.
#
# Status-bar chrome follows gensho-theme.el's "sunken" chrome direction:
#   bar bg      = MONO2 (chrome / tab-bar layer)
#   active item = MONO0 (= body bg, flush with terminal underneath — sunken)
#   inactive    = MONO1 (one step above bar but below body)
# Each segment gets Powerline lower-triangle slants (U+E0B8 / U+E0BA) so its
# lower edge merges with the body below — mirroring my-ui-face.el's
# tab-bar-tab-name-format. THEME_MONO* exports come from
# config/shell/zsh/colors.sh.

# --- Core behavior -----------------------------------------------------------
set -g default-command zsh
set -g base-index 1
setw -g pane-base-index 1
set -s escape-time 0
set -g repeat-time 300
set -g focus-events on
set -g extended-keys on
set -g allow-passthrough on

# Generous scrollback. Per-line storage is allocated lazily as output is
# produced, so a high cap costs nothing until actually filled (~ tens of MB per
# pane only if a pane scrolls its full 50k lines). tmux is the *only*
# scrollback — see the Scrollback & mouse note below.
set -g history-limit 50000

# --- Scrollback & mouse ------------------------------------------------------
# tmux owns the scrollback. With `mouse on`, the terminal (mintty/ghostty) puts
# the wheel into mouse-reporting mode, so wheel events go to tmux, not the
# terminal's own buffer. tmux always runs on the alternate screen, so the
# terminal scrollback is empty anyway — history-limit above is the single
# source of truth for how far back you can scroll.
set -g mouse on

# Smooth wheel: 1 line per notch instead of tmux's default 5, so you can track
# exactly how far you've moved. For long jumps use copy-mode keys (C-u/C-d
# half-page, g/G top/bottom, / and ? search). Entering/leaving copy-mode stays
# on the default root WheelUpPane binding (copy-mode -e auto-exits at the
# bottom); `select-pane` mirrors that default's behavior of activating the
# wheeled pane.
bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# --- Prefix & input keys -----------------------------------------------------
unbind -n C-b
set -g prefix C-a
bind C-a send-prefix
set -g status-keys vi

# --- Keybindings -------------------------------------------------------------
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display 'Reloaded tmux config.'

# --- Copy & Paste ------------------------------------------------------------
# Keyboard (vi) copy: enter copy-mode, move (hjkl + vi motions), select, yank.
#   C-a C-v  → copy-mode + begin selection in one step (then hjkl, then y)
#   C-a V    → copy-mode + select whole line (then j/k to extend, then y)
#   v        → begin selection,  Escape → cancel
# This is the standard vi-copy flow; the only fix needed was making `y` actually
# reach the OS clipboard (see the copy-pipe bindings below).
setw -g mode-keys vi
# Use win32yank/pbcopy as the sole clipboard path; disable tmux's OSC 52
# (set-clipboard) — mintty caps OSC 52 at 1536 bytes and it's flaky, so letting
# it also write would risk truncating large copies. win32yank has no limit.
set -g set-clipboard off
bind C-v copy-mode \; send-keys -X begin-selection
bind V copy-mode \; send-keys -X begin-selection \; send-keys -X select-line
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi Escape send-keys -X cancel

# Copy to the SYSTEM clipboard. Keyboard `y` and the mouse all use the SAME
# stable, unlimited path: copy-selection-and-cancel (commit selection + leave
# copy-mode cleanly) then push the buffer to the clipboard tool via a shell pipe.
#   drag           → select region, release to copy
#   double-click   → select & copy the word   (root table: click from normal mode)
#   triple-click   → select & copy the line
# Windows uses win32yank via `tmux show-buffer | win32yank` (a shell pipe — tmux's
# direct stdin pipe to a native .exe is unreliable on MSYS, and `cat | win32yank`
# left a lingering process that made the selection highlight flicker). macOS uses
# pbcopy directly (native, no pipe quirk). set-clipboard is off (below) so this is
# the single authoritative path — no OSC 52 (mintty caps it at 1536 bytes).
# (For the terminal's own selection instead, hold Shift while dragging.)
if-shell 'command -v pbcopy >/dev/null 2>&1' {
  bind -T copy-mode-vi y                 send-keys -X copy-pipe-and-cancel 'pbcopy'
  bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'
  bind -T root DoubleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel 'pbcopy'
  bind -T root TripleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-line \; send-keys -X copy-pipe-and-cancel 'pbcopy'
  bind P run 'pbpaste | tmux load-buffer - && tmux paste-buffer'
} {
  bind -T copy-mode-vi y                 send-keys -X copy-selection-and-cancel \; run-shell "tmux show-buffer | win32yank.exe -i --crlf"
  bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel \; run-shell "tmux show-buffer | win32yank.exe -i --crlf"
  bind -T root DoubleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-word \; send-keys -X copy-selection-and-cancel \; run-shell "tmux show-buffer | win32yank.exe -i --crlf"
  bind -T root TripleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-line \; send-keys -X copy-selection-and-cancel \; run-shell "tmux show-buffer | win32yank.exe -i --crlf"
  bind P run 'win32yank.exe -o --lf | tmux load-buffer - && tmux paste-buffer'
}

# --- Window navigation -------------------------------------------------------
bind -r a new-window
bind -r n previous-window
bind -r p next-window

# --- Pane navigation ---------------------------------------------------------
bind -n C-w if-shell 'ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +(\\S+/)?g?(view|n?vim?x?)(diff)?$|emacs"' 'send-keys C-w' 'switch-client -Tprefix'
# C-w e / C-w m — terminal window operations, caught in the prefix key table
# that C-w switches to when outside vim/emacs.
# send-keys -H injects raw bytes directly into the shell's pty, bypassing
# tmux key-table interception. The running zsh ZLE sees ^We / ^Wm and fires
# _cycle_term_size / _toggle_term_maximize (defined in term.sh), which contain
# the sole copy of the size list and use DCS passthrough to reach the outer terminal.
# hex: 0x17=Ctrl+W  0x65=e  0x6d=m
bind e send-keys -H 17 65
bind m send-keys -H 17 6d
bind s split-window
bind v split-window -h
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R
bind -r C-k select-pane -U
bind -r C-j select-pane -D
bind -r C-h select-pane -L
bind -r C-l select-pane -R
bind -r '{' swap-pane -U
bind -r '}' swap-pane -D
bind c kill-pane
bind -r - resize-pane -D
bind -r + resize-pane -U
bind -r < resize-pane -L
bind -r > resize-pane -R

# --- Appearance --------------------------------------------------------------
set -g set-titles on
set -g set-titles-string "#T"
# No clock in the status bar, so no periodic redraw is needed — prefix/zoom
# indicators (status-right) are event-driven and redraw immediately.
set -g status-interval 60
set -g status-position top
set -g status-left-length 40
set -g status-right-length 80

# --- Termcolor ---------------------------------------------------------------
set -g terminal-overrides "xterm*:XT:smcup@:rmcup@"
set -ag terminal-overrides ',*:U8=0'

# --- Sunken chrome (status bar) ---------------------------------------------
# Slant glyphs (Powerline lower triangles, require a Nerd Font):
#    = lower-right filled — used at the LEFT edge of a segment.
#            cell shows segment color in lower-right, bar color in upper-left.
#    = lower-left  filled — used at the RIGHT edge of a segment.
#            cell shows segment color in lower-left, bar color in upper-right.
# Together they form a trapezoid that widens at the bottom into the body —
# the same "玄昌石 stone recess" silhouette my-ui-face.el draws for tab-bar.

set -g status-style "fg=$THEME_MONO6,bg=$THEME_MONO2"

# Inactive window: sits ON the bar at MONO1 (one step above bar).
set -g window-status-format "#[fg=$THEME_MONO1,bg=$THEME_MONO2]#[fg=$THEME_MONO6,bg=$THEME_MONO1] #I #{=20:window_name} #F #[fg=$THEME_MONO1,bg=$THEME_MONO2]"

# Active window: sunken to MONO0 (= body bg), flanked by slants painted in
# MONO0 fg on the bar (MONO2) background.
set -g window-status-current-format "#[fg=$THEME_MONO0,bg=$THEME_MONO2]#[fg=$THEME_MONO7,bg=$THEME_MONO0,bold] #I #{=20:window_name} #F #[fg=$THEME_MONO0,bg=$THEME_MONO2]"

# No extra space between windows — slants already provide visual margin.
set -g window-status-separator ""

# status-left: session name as a sunken segment (1-char bar-bg pad at the very
# left so the leading slant doesn't touch the screen edge — mirrors
# my/mode-line-edge-pad in my-ui-face.el). Doubles as the PREFIX indicator:
# while C-a is pending (client_prefix) the whole pill flips to the accent
# colour ($THEME_CYAN — change that to recolour). Zoom is shown by #F's Z.
# Styles are switched by choosing a whole #[...] per branch so no comma ever
# sits inside a #[...] (that would be read as a #{?} argument separator).
set -g status-left " #{?client_prefix,#[fg=$THEME_CYAN],#[fg=$THEME_MONO0]}#[bg=$THEME_MONO2]#{?client_prefix,#[fg=$THEME_MONO0]#[bg=$THEME_CYAN],#[fg=$THEME_MONO7]#[bg=$THEME_MONO0]}#[bold] #S #{?client_prefix,#[fg=$THEME_CYAN],#[fg=$THEME_MONO0]}#[bg=$THEME_MONO2] "

# status-right: empty. The prefix indicator moved to the session pill (colour
# flip above) and zoom already shows as Z in the window flags (#F), so the
# right side stays clean. status-interval stays high since nothing here ticks.
set -g status-right ""

# --- Pane border colors ------------------------------------------------------
# Invisible: both borders use mono0 (= bg). Area distinction comes from bg
# planes (window-style below), not border lines — matching gensho's
# vertical-border = mono0 philosophy.
set -g pane-border-style        "fg=$THEME_MONO0"
set -g pane-active-border-style "fg=$THEME_MONO0"

# --- Pane dimming (mirrors auto-dim-other-buffers-mode) ----------------------
# Non-active panes use dim0 bg; active uses mono0. Only DEFAULT bg cells are
# affected; apps with explicit colors show through (same as auto-dim in Emacs).
set -g window-style        "bg=$THEME_DIM0"
set -g window-active-style "bg=$THEME_MONO0"

# --- Message colors ----------------------------------------------------------
set -g message-style "fg=$THEME_MONO7,bg=$THEME_MONO3"
set -g message-command-style "fg=$THEME_MONO7,bg=$THEME_MONO3"

# Command-prompt (:) cursor — match the prefix accent exactly. tmux's default is
# the named "cyan" (a generic RGB), close to but not the gensho cyan. Pin to the
# real hex so the prompt cursor equals the prefix pill ($THEME_CYAN = #5f9196).
set -g prompt-cursor-colour "$THEME_CYAN"

# --- Mode (copy/select) colors ----------------------------------------------
set -g mode-style "fg=$THEME_MONO7,bg=$THEME_MONO3"
