shell = "zsh"

# Load order is significant. fzf-tab must precede compinit-using plugins,
# but our zsh.sh already ran compinit before sourcing sheldon, which fzf-tab
# explicitly supports. fast-syntax-highlighting must be last so it sees all
# widgets, autosuggestions in the middle.

[plugins.fzf-tab]
github = "Aloxaf/fzf-tab"

[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"

[plugins.fast-syntax-highlighting]
github = "zdharma-continuum/fast-syntax-highlighting"
