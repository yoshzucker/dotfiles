# navi — Ctrl-G launches the picker (zsh widget wired up in zsh.sh).
# Uses fzf as the finder so it inherits FZF_DEFAULT_OPTS theming.

# Column colors. ANSI names map through the OSC palette set by colors.sh.
# After the Solarized re-shuffle, every slot here is guaranteed to be
# visible on bg (mono0).
style:
  tag:
    color: cyan         # slot 6  — #5f9196, distinct hue
    width_percentage: 26
    min_width: 20
  comment:
    color: white        # slot 7  — #6a6d6d (mono5), readable secondary text
    width_percentage: 42
    min_width: 45
  snippet:
    color: grey         # crossterm "Grey" ≈ slot 15 brightwhite (mono7)

cheats:
  paths:
    - ~/.config/navi/cheats

finder:
  command: fzf
  overrides: --height 70% --layout=reverse --border=rounded
  overrides_var: --preview-window=right,60%,border-left

shell:
  command: zsh
