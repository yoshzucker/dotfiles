# Local-only history. No sync, no telemetry. atuin owns Ctrl-R only;
# Up-arrow stays on zsh's native prefix search (--disable-up-arrow in zsh.sh).

auto_sync = false
update_check = false
sync_address = ""

search_mode = "fuzzy"
filter_mode = "global"
filter_mode_shell_up_key_binding = "session"

style = "compact"
inline_height = 10
show_preview = true
enter_accept = true
